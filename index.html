<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Où est Paolo ?</title>
<script src="data.json"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: rgba(255,255,255,0.08);
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --pulse: #f0883e;
    --green: #3fb950;
    --purple: #bc8cff;
    --teal: #39d3c3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2rem 2rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo-text {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--pulse); }
  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .live-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--green);
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.3);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: livepulse 2s infinite;
  }
  @keyframes livepulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 73px);
  }

  /* GLOBE */
  .globe-section {
    position: relative;
    background: radial-gradient(ellipse at center, #0d1f3c 0%, #0d1117 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #globe-canvas {
    display: block;
    cursor: grab;
  }
  #globe-canvas:active { cursor: grabbing; }

  .globe-overlay {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13,17,23,0.85);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    backdrop-filter: blur(8px);
    text-align: center;
    white-space: nowrap;
  }
  .globe-overlay .location-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--pulse);
  }
  .globe-overlay .location-sub {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* SECTION TITLES */
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  /* LAST TRIP CARD */
  .last-trip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }
  .trip-route {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.95rem;
    font-weight: 500;
    flex-wrap: wrap;
  }
  .trip-from { color: var(--muted); }
  .trip-arrow { color: var(--pulse); font-size: 1.1rem; }
  .trip-to { color: var(--text); }
  .trip-meta {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .trip-badge {
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-date { background: rgba(88,166,255,0.12); color: var(--accent); }
  .badge-km { background: rgba(63,185,80,0.1); color: var(--green); }
  .badge-transport { background: rgba(188,140,255,0.12); color: var(--purple); }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* COUNTRIES */
  .countries-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .country-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .flag { font-size: 1rem; }

  /* TRANSPORT BREAKDOWN */
  .transport-list { display: flex; flex-direction: column; gap: 8px; }
  .transport-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .transport-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .transport-label { font-size: 0.8rem; color: var(--muted); flex: 1; }
  .transport-bar-wrap {
    flex: 2;
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }
  .transport-bar { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .transport-km { font-size: 0.75rem; color: var(--muted); min-width: 52px; text-align: right; }

  /* RECENT TRIPS */
  .trips-list { display: flex; flex-direction: column; gap: 0; }
  .trip-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .trip-item:last-child { border-bottom: none; }
  .trip-item-icon {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .trip-item-route { flex: 1; line-height: 1.4; }
  .trip-item-from-to { color: var(--text); }
  .trip-item-date { font-size: 0.7rem; color: var(--muted); }
  .trip-item-km { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 2rem;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); }

  /* MOBILE */
  @media (max-width: 768px) {
    .main {
      grid-template-columns: 1fr;
      height: auto;
    }
    .globe-section { height: 60vw; min-height: 280px; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); }
    header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-text">📍 Où est <span>Paolo</span> ?</div>
  <div class="tagline">Tracker de voyage en temps réel</div>
  <div class="live-badge">
    <div class="live-dot"></div>
    En direct
  </div>
</header>

<div class="main">
  <!-- GLOBE -->
  <div class="globe-section">
    <canvas id="globe-canvas"></canvas>
    <div class="globe-overlay" id="location-overlay">
      <div class="location-name" id="overlay-location">Chargement…</div>
      <div class="location-sub" id="overlay-date"></div>

  <div class="sidebar">
    <div id="sidebar-content">

</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── TRANSPORT CONFIG ─────────────────────────────────────────────
const LAYERS = [
  { url: 'https://umap.openstreetmap.fr/fr/datalayer/1007436/6c83c270-c92c-4cf9-8338-98033e16cd10/', type: 'avion', label: 'Avion', emoji: '✈️', color: '#58a6ff', barColor: '#58a6ff' },
  { url: 'https://umap.openstreetmap.fr/fr/datalayer/1007436/83c373a4-1701-4cfe-be18-92a32a83a38b/', type: 'train', label: 'Train', emoji: '🚆', color: '#3fb950', barColor: '#3fb950' },
  { url: 'https://umap.openstreetmap.fr/fr/datalayer/1007436/d901a5e2-79d5-45da-a2c0-758ec6fd7b29/', type: 'bateau', label: 'Bateau', emoji: '🚢', color: '#39d3c3', barColor: '#39d3c3' },
  { url: 'https://umap.openstreetmap.fr/fr/datalayer/1007436/f732a9fd-d680-43eb-a449-9295a0293adc/', type: 'bus', label: 'Bus', emoji: '🚌', color: '#f0883e', barColor: '#f0883e' },
  { url: 'https://umap.openstreetmap.fr/fr/datalayer/1007436/f81757c9-4dd1-41fa-b689-6bd9840a3967/', type: 'voiture', label: 'Voiture', emoji: '🚗', color: '#bc8cff', barColor: '#bc8cff' },
];

// Country flags lookup (common countries in Paolo's routes)
const COUNTRY_FLAGS = {
  'France': '🇫🇷', 'Senegal': '🇸🇳', 'Sénégal': '🇸🇳', 'Espagne': '🇪🇸', 'Spain': '🇪🇸',
  'Italie': '🇮🇹', 'Italy': '🇮🇹', 'Suisse': '🇨🇭', 'Switzerland': '🇨🇭',
  'Tunisie': '🇹🇳', 'Tunisia': '🇹🇳', 'Allemagne': '🇩🇪', 'Germany': '🇩🇪',
  'Portugal': '🇵🇹', 'Maroc': '🇲🇦', 'Morocco': '🇲🇦', 'Autriche': '🇦🇹', 'Austria': '🇦🇹',
  'Belgique': '🇧🇪', 'Belgium': '🇧🇪', 'Pays-Bas': '🇳🇱', 'Netherlands': '🇳🇱',
};

// ─── DATA LOADING (depuis data.js généré par update.py) ───────────
// PAOLO_DATA est injecté par le <script src="data.js"> dans le <head>
// Si data.js est absent, on affiche un message d'erreur utile.

function loadAllData() {
  if (typeof PAOLO_DATA === 'undefined' || !PAOLO_DATA.length) {
    return Promise.resolve([]);
  }
  // Déjà trié par date desc dans data.js, mais on re-trie par sécurité
  const all = [...PAOLO_DATA];
  all.sort((a, b) => {
    const da = parseDate(a.date), db = parseDate(b.date);
    return db - da;
  });
  return Promise.resolve(all);
}

function parseDate(str) {
  if (!str) return new Date(0);
  const [d, m, y] = str.split('/');
  return new Date(`${y}-${m}-${d}`);
}

function formatDate(str) {
  if (!str) return '';
  const [d, m, y] = str.split('/');
  const months = ['jan', 'fév', 'mar', 'avr', 'mai', 'jun', 'jul', 'aoû', 'sep', 'oct', 'nov', 'déc'];
  return `${d} ${months[parseInt(m)-1]} ${y}`;
}

// ─── GLOBE ────────────────────────────────────────────────────────
let globe, renderer, scene, camera, earthMesh, pulseRing, pulseRing2;
let targetLat = 48.8566, targetLon = 2.3522; // Default Paris
let isDragging = false, prevMouse = {x:0, y:0};
let autoRotate = true;

function initGlobe() {
  const canvas = document.getElementById('globe-canvas');
  const container = canvas.parentElement;
  const W = container.clientWidth;
  const H = container.clientHeight;

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
  camera.position.set(0, 0, 2.6);

  // Ambient light
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));
  const sun = new THREE.DirectionalLight(0x88aaff, 1.2);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // Earth sphere
  const geo = new THREE.SphereGeometry(1, 64, 64);

  // Draw earth texture procedurally with canvas
  const texCanvas = document.createElement('canvas');
  texCanvas.width = 1024; texCanvas.height = 512;
  const ctx = texCanvas.getContext('2d');

  // Ocean
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, 1024, 512);

  // Simple continent-like landmass shapes (stylized)
  ctx.fillStyle = '#1a3a2a';

  // Europe/Africa
  ctx.beginPath();
  ctx.ellipse(520, 160, 60, 80, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(530, 290, 55, 100, 0.1, 0, Math.PI*2); ctx.fill();

  // Americas
  ctx.beginPath();
  ctx.ellipse(230, 150, 70, 90, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(255, 310, 50, 90, -0.2, 0, Math.PI*2); ctx.fill();

  // Asia
  ctx.beginPath();
  ctx.ellipse(720, 160, 140, 90, 0, 0, Math.PI*2); ctx.fill();

  // Australia
  ctx.beginPath();
  ctx.ellipse(780, 350, 55, 40, 0, 0, Math.PI*2); ctx.fill();

  // Add grid lines
  ctx.strokeStyle = 'rgba(88, 166, 255, 0.08)';
  ctx.lineWidth = 1;
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = ((90 - lat) / 180) * 512;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1024, y); ctx.stroke();
  }
  for (let lon = 0; lon <= 360; lon += 30) {
    const x = (lon / 360) * 1024;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(texCanvas);
  const mat = new THREE.MeshPhongMaterial({ map: tex, specular: 0x1a3a5c, shininess: 15 });
  earthMesh = new THREE.Mesh(geo, mat);
  scene.add(earthMesh);

  // Atmosphere glow
  const atmGeo = new THREE.SphereGeometry(1.02, 64, 64);
  const atmMat = new THREE.MeshPhongMaterial({
    color: 0x1a4a8a,
    transparent: true,
    opacity: 0.12,
    side: THREE.FrontSide,
  });
  scene.add(new THREE.Mesh(atmGeo, atmMat));

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for (let i = 0; i < 2000; i++) {
    const r = 15 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPos.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.04, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Pulse rings (position marker)
  const ringGeo = new THREE.RingGeometry(0.015, 0.025, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xf0883e, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
  pulseRing = new THREE.Mesh(ringGeo, ringMat);

  const ringGeo2 = new THREE.RingGeometry(0.030, 0.042, 32);
  const ringMat2 = new THREE.MeshBasicMaterial({ color: 0xf0883e, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
  pulseRing2 = new THREE.Mesh(ringGeo2, ringMat2);

  // Dot
  const dotGeo = new THREE.SphereGeometry(0.013, 16, 16);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xf0883e });
  globe = new THREE.Group();
  globe.add(new THREE.Mesh(dotGeo, dotMat));
  globe.add(pulseRing);
  globe.add(pulseRing2);
  scene.add(globe);

  // Controls
  canvas.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; prevMouse = {x: e.clientX, y: e.clientY}; });
  canvas.addEventListener('touchstart', e => { isDragging = true; autoRotate = false; prevMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('touchend', () => isDragging = false);
  canvas.addEventListener('mousemove', onDrag);
  canvas.addEventListener('touchmove', e => { e.preventDefault(); onDrag(e.touches[0]); }, { passive: false });

  window.addEventListener('resize', () => {
    const W = container.clientWidth, H = container.clientHeight;
    renderer.setSize(W, H);
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
  });

  animate();
  setGlobePosition(targetLat, targetLon);
}

function onDrag(e) {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  earthMesh.rotation.y += dx * 0.005;
  earthMesh.rotation.x += dy * 0.005;
  earthMesh.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, earthMesh.rotation.x));
  prevMouse = {x: e.clientX, y: e.clientY};
}

function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function setGlobePosition(lat, lon) {
  targetLat = lat; targetLon = lon;
  const pos = latLonToVec3(lat, lon, 1.015);
  globe.position.copy(pos);

  // Orient rings to face outward
  globe.lookAt(pos.clone().multiplyScalar(2));

  // Rotate earth so the point faces camera
  const targetRotY = -(lon + 180) * (Math.PI / 180);
  earthMesh.rotation.y = targetRotY;
  earthMesh.rotation.x = lat * (Math.PI / 180) * 0.3;
}

let clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRotate) {
    earthMesh.rotation.y += 0.0008;
  }

  // Pulse animation
  if (pulseRing) {
    const s = 1 + 0.5 * Math.sin(t * 3);
    pulseRing.scale.setScalar(s);
    pulseRing.material.opacity = 0.9 - 0.5 * Math.abs(Math.sin(t * 3));
  }
  if (pulseRing2) {
    const s2 = 1 + 0.4 * Math.sin(t * 3 + 1);
    pulseRing2.scale.setScalar(s2);
    pulseRing2.material.opacity = 0.5 - 0.3 * Math.abs(Math.sin(t * 3 + 1));
  }

  renderer.render(scene, camera);
}

// ─── GEOCODING (approximate from city name) ───────────────────────
const CITY_COORDS = {
  'toulouse': [43.6047, 1.4442], 'dakar': [14.7167, -17.4677],
  'paris': [48.8566, 2.3522], 'madrid': [40.4168, -3.7038],
  'barcelone': [41.3851, 2.1734], 'rome': [41.9028, 12.4964],
  'milan': [45.4642, 9.1900], 'palerme': [38.1157, 13.3615],
  'palermo': [38.1157, 13.3615], 'tunis': [36.8065, 10.1815],
  'la goulette': [36.818, 10.305], 'délégation la goulette': [36.818, 10.305],
  'marseille': [43.2965, 5.3698], 'lyon': [45.7640, 4.8357],
  'nice': [43.7102, 7.2620], 'bordeaux': [44.8378, -0.5792],
  'nantes': [47.2184, -1.5536], 'strasbourg': [48.5734, 7.7521],
  'genève': [46.2044, 6.1432], 'geneva': [46.2044, 6.1432],
  'zurich': [47.3769, 8.5417], 'zürich': [47.3769, 8.5417],
  'berne': [46.9480, 7.4474], 'bern': [46.9480, 7.4474],
  'buchs': [47.1684, 9.4783], 'altsatten': [47.3740, 9.5568],
  'lexos': [44.142, 1.885], 'ngaparou': [14.468, -17.053],
  'berlin': [52.5200, 13.4050], 'munich': [48.1351, 11.5820],
  'vienne': [48.2082, 16.3738], 'vienna': [48.2082, 16.3738],
  'amsterdam': [52.3676, 4.9041], 'bruxelles': [50.8503, 4.3517],
  'lisbonne': [38.7223, -9.1393], 'lisbon': [38.7223, -9.1393],
  'séville': [37.3891, -5.9845], 'seville': [37.3891, -5.9845],
  'florence': [43.7696, 11.2558], 'venise': [45.4408, 12.3155],
  'naples': [40.8518, 14.2681], 'catane': [37.5079, 15.0830],
  'casablanca': [33.5731, -7.5898], 'rabat': [34.0209, -6.8416],
  'accra': [5.6037, -0.1870], 'abidjan': [5.3599, -4.0082],
};

function getCityCoords(name) {
  if (!name) return null;
  const key = name.toLowerCase().trim();
  if (CITY_COORDS[key]) return CITY_COORDS[key];
  // Partial match
  for (const [k, v] of Object.entries(CITY_COORDS)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  return null;
}

// ─── STATS RENDERING ─────────────────────────────────────────────
function inferCountry(cityName) {
  if (!cityName) return null;
  const city = cityName.toLowerCase();
  if (['toulouse', 'paris', 'marseille', 'lyon', 'nice', 'bordeaux', 'lexos', 'nantes'].some(c => city.includes(c))) return { name: 'France', flag: '🇫🇷' };
  if (['dakar', 'ngaparou', 'saly'].some(c => city.includes(c))) return { name: 'Sénégal', flag: '🇸🇳' };
  if (['madrid', 'barcelone', 'séville', 'seville'].some(c => city.includes(c))) return { name: 'Espagne', flag: '🇪🇸' };
  if (['rome', 'milan', 'palerme', 'palermo', 'florence', 'naples', 'catane', 'venise'].some(c => city.includes(c))) return { name: 'Italie', flag: '🇮🇹' };
  if (['tunis', 'goulette', 'sfax', 'sousse'].some(c => city.includes(c))) return { name: 'Tunisie', flag: '🇹🇳' };
  if (['genève', 'zurich', 'berne', 'buchs', 'altsatten', 'bâle'].some(c => city.includes(c))) return { name: 'Suisse', flag: '🇨🇭' };
  if (['berlin', 'munich', 'francfort'].some(c => city.includes(c))) return { name: 'Allemagne', flag: '🇩🇪' };
  if (['amsterdam'].some(c => city.includes(c))) return { name: 'Pays-Bas', flag: '🇳🇱' };
  if (['bruxelles', 'bruges'].some(c => city.includes(c))) return { name: 'Belgique', flag: '🇧🇪' };
  if (['lisbonne', 'lisbon', 'porto'].some(c => city.includes(c))) return { name: 'Portugal', flag: '🇵🇹' };
  if (['vienne', 'vienna', 'graz'].some(c => city.includes(c))) return { name: 'Autriche', flag: '🇦🇹' };
  if (['casablanca', 'rabat', 'marrakech'].some(c => city.includes(c))) return { name: 'Maroc', flag: '🇲🇦' };
  return null;
}

function renderSidebar(trips) {
  if (!trips || trips.length === 0) {
    document.getElementById('sidebar-content').innerHTML = `
      <div style="padding:1rem;color:var(--muted);font-size:0.85rem;line-height:1.7">
        <div style="font-size:1.5rem;margin-bottom:0.5rem">⚠️</div>
        <strong style="color:var(--text)">Données manquantes</strong><br>
        Lance <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">python update.py</code> pour générer <code style="background:var(--surface2);padding:2px 6px;border-radius:4px">data.json</code>, puis recharge la page.
      </div>
    `;
    return;
  }

  const latest = trips[0];
  const currentYear = new Date().getFullYear();

  // Year km
  const yearKm = trips
    .filter(t => parseDate(t.date).getFullYear() === currentYear)
    .reduce((s, t) => s + t.km, 0);

  const totalKm = trips.reduce((s, t) => s + t.km, 0);

  // Countries
  const countriesMap = new Map();
  for (const t of trips) {
    const c = inferCountry(t.to) || inferCountry(t.from);
    if (c && !countriesMap.has(c.name)) countriesMap.set(c.name, c);
  }
  const countries = [...countriesMap.values()];

  // Transport breakdown
  const byType = {};
  for (const t of trips) {
    if (!byType[t.type]) byType[t.type] = { km: 0, count: 0, label: t.label, emoji: t.emoji, color: t.color };
    byType[t.type].km += t.km;
    byType[t.type].count++;
  }
  const maxKm = Math.max(...Object.values(byType).map(b => b.km));

  // Recent trips (top 8)
  const recent = trips.slice(0, 8);

  // Update globe
  const destCoords = latest.destCoord;
  if (destCoords) {
    const [lon, lat] = destCoords;
    setGlobePosition(lat, lon);
  } else {
    const coords = getCityCoords(latest.to);
    if (coords) setGlobePosition(coords[0], coords[1]);
  }

  document.getElementById('overlay-location').textContent = latest.to || latest.from || '?';
  document.getElementById('overlay-date').textContent = `Dernière position · ${formatDate(latest.date)}`;

  document.getElementById('sidebar-content').innerHTML = `
    <div>
      <div class="section-label">Dernier trajet</div>
      <div class="last-trip">
        <div class="trip-route">
          <span class="trip-from">${latest.from}</span>
          <span class="trip-arrow">→</span>
          <span class="trip-to">${latest.to}</span>
        </div>
        <div class="trip-meta">
          <span class="trip-badge badge-date">📅 ${formatDate(latest.date)}</span>
          <span class="trip-badge badge-km">📏 ${latest.km.toLocaleString('fr')} km</span>
          <span class="trip-badge badge-transport">${latest.emoji} ${latest.label}</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Statistiques ${currentYear}</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${yearKm.toLocaleString('fr')}</div>
          <div class="stat-label">km cette année</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${trips.filter(t => parseDate(t.date).getFullYear() === currentYear).length}</div>
          <div class="stat-label">trajets ${currentYear}</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${countries.length}</div>
          <div class="stat-label">pays visités</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalKm.toLocaleString('fr')}</div>
          <div class="stat-label">km au total</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Pays visités</div>
      <div class="countries-list">
        ${countries.map(c => `<div class="country-tag"><span class="flag">${c.flag}</span>${c.name}</div>`).join('')}
        ${countries.length === 0 ? '<span style="color:var(--muted);font-size:0.8rem">En cours de détection…</span>' : ''}
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Par mode de transport</div>
      <div class="transport-list">
        ${Object.entries(byType).sort((a,b) => b[1].km - a[1].km).map(([type, info]) => `
          <div class="transport-row">
            <div class="transport-icon" style="background:${info.color}22">${info.emoji}</div>
            <div class="transport-label">${info.label} <span style="color:var(--muted);font-size:0.7rem">(${info.count})</span></div>
            <div class="transport-bar-wrap">
              <div class="transport-bar" style="width:${Math.round(info.km/maxKm*100)}%;background:${info.color}"></div>
            </div>
            <div class="transport-km">${info.km.toLocaleString('fr')} km</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Trajets récents</div>
      <div class="trips-list">
        ${recent.map(t => `
          <div class="trip-item">
            <div class="trip-item-icon" style="background:${t.color}22">${t.emoji}</div>
            <div class="trip-item-route">
              <div class="trip-item-from-to">${t.from} → ${t.to}</div>
              <div class="trip-item-date">${formatDate(t.date)}</div>
            </div>
            <div class="trip-item-km">${t.km.toLocaleString('fr')} km</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ─── INIT ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initGlobe();
  const trips = await loadAllData();
  renderSidebar(trips);
});
</script>
</body>
</html>
