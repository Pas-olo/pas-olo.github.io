<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Où est Paolo ?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e0d8;
      --text: #1a1a1a;
      --muted: #7a7670;
      --accent: #4a90d9;
      --pulse: #27ae60;

      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-pop: 0 8px 28px rgba(0,0,0,0.14);
      --shadow-soft: 0 4px 16px rgba(0,0,0,0.1);

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-section: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
    }
    button { font-family: inherit; }

    /* ───────────────────────── HEADER ───────────────────────── */
    header {
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }
    .logo-text { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--pulse); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .overland-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px 4px 4px;
      border-radius: 20px;
    }
    .overland-toggle input { display: none; }
    .toggle-track {
      width: 30px;
      height: 17px;
      background: #d7d4c8;
      border-radius: 20px;
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 13px; height: 13px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
      transition: transform 0.2s;
    }
    .overland-toggle input:checked + .toggle-track {
      background: var(--pulse);
    }
    .overland-toggle input:checked + .toggle-track .toggle-thumb {
      transform: translateX(13px);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: #27ae60;
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      background: #27ae60;
      border-radius: 50%;
      animation: livepulse 2s infinite;
    }
    @keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ───────────────────────── CARTE ───────────────────────── */
    #map-wrap { flex: 1; position: relative; background: #e8eaf2; }
    #map { width: 100%; height: 100%; }
    #map :focus { outline: none; }

    .globe-tooltip {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.65rem 1.1rem;
      font-size: 0.82rem;
      box-shadow: var(--shadow-soft);
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      z-index: 900;
    }
    .tooltip-city { font-weight: 700; font-size: 0.95rem; color: var(--pulse); }
    .tooltip-date { color: var(--muted); margin-top: 1px; }

    /* Popup de détail de trajet (Leaflet) */
    .leaflet-popup.trip-popup .leaflet-popup-content-wrapper {
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-pop);
      padding: 0;
    }
    .leaflet-popup.trip-popup .leaflet-popup-content { margin: 0; width: 232px !important; }
    .leaflet-popup.trip-popup .leaflet-popup-tip-container { display: none; }
    .trip-popup-card { padding: 0.85rem 0.95rem; }
    .tp-route {
      font-size: 0.92rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
      padding-right: 0.7rem;
    }
    .tp-arrow { color: var(--pulse); }
    .tp-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0.45rem; }
    .tp-country {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ───────────────────────── SIDEBAR ───────────────────────── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .sidebar-section { margin-top: var(--space-section); }
    .sidebar-section:first-child { margin-top: 0; }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .last-trip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .last-trip:hover { border-color: var(--pulse); background: #eafaf1; }
    .trip-route { font-size: 0.88rem; font-weight: 500; display: flex; align-items: center; gap: var(--space-1); flex-wrap: wrap; }
    .trip-from { color: var(--muted); }
    .trip-arrow { color: var(--pulse); }
    .trip-meta { margin-top: var(--space-2); display: flex; gap: var(--space-1); flex-wrap: wrap; }
    .badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
    .badge-date { background: #eaf3fc; color: #2471a3; }
    .badge-km   { background: #eafaf1; color: #1e8449; }
    .badge-tp   { background: #fdf2f8; color: #7d3c98; }
    .badge-co2  { background: #eaf6ec; color: #2e7d32; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); }
    .stat-card {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2.5px;
      background: var(--stat-accent, var(--accent));
      opacity: 0.8;
    }
    .stat-card:hover { border-color: var(--stat-accent, var(--border)); transform: translateY(-1px); }
    .stat-icon {
      width: 22px; height: 22px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      background: color-mix(in srgb, var(--stat-accent, var(--accent)) 16%, transparent);
      margin-bottom: var(--space-2);
    }
    .stat-value { font-size: 1.3rem; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 0.66rem; color: var(--muted); margin-top: 3px; }

    .stat-card-update { cursor: help; }
    .stat-update-value {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .countries-list { display: flex; flex-wrap: wrap; gap: var(--space-1); }
    .country-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      font-size: 0.73rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .country-tag-more {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      font-size: 0.73rem;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .country-tag-more:hover { background: #eaf3fc; border-color: var(--accent); }

    .transport-list { display: flex; flex-direction: column; gap: var(--space-3); }
    .transport-row { display: flex; align-items: center; gap: var(--space-2); }
    .transport-icon {
      width: 24px; height: 24px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .transport-label { font-size: 0.75rem; font-weight: 600; width: 52px; flex-shrink: 0; }
    .transport-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .transport-bar-group { display: flex; align-items: center; gap: var(--space-2); }
    .transport-bar-tag {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--muted);
      width: 26px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .transport-bar-wrap { flex: 1; height: 4px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .transport-bar { height: 100%; border-radius: 3px; }
    .transport-val { font-size: 0.68rem; color: var(--muted); min-width: 58px; text-align: right; flex-shrink: 0; }

    .trips-list { display: flex; flex-direction: column; }
    .trip-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-1);
      margin: 0 calc(-1 * var(--space-1));
      border-bottom: 1px solid var(--border);
      font-size: 0.76rem;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .trip-item:last-child { border-bottom: none; }
    .trip-item:hover { background: var(--surface2); }
    .trip-item.is-active { background: #eafaf1; }
    .trip-item-icon {
      width: 21px; height: 21px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; flex-shrink: 0;
    }
    .trip-item-route { flex: 1; line-height: 1.4; }
    .trip-item-from-to { color: var(--text); font-weight: 500; }
    .trip-item-date { font-size: 0.66rem; color: var(--muted); }
    .trip-item-km { color: var(--muted); font-size: 0.7rem; white-space: nowrap; }

    .no-data { padding: var(--space-4) 0; color: var(--muted); font-size: 0.83rem; text-align: center; }

    /* ───────────────────────── MARQUEUR PULSE ───────────────────────── */
    .leaflet-pulse-icon {
      background: #27ae60;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7);
      animation: pulse-dot 1.8s infinite;
    }
    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7); }
      70%  { box-shadow: 0 0 0 15px rgba(39, 174, 96, 0); }
      100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); }
    }

    /* ───────────────────────── MODALE ───────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20, 18, 14, 0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; padding: 1rem;
    }
    .modal-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      max-width: 480px; width: 100%;
      max-height: 80vh; overflow-y: auto;
      box-shadow: var(--shadow-pop);
      padding: 1.25rem 1.4rem;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.9rem;
    }
    .modal-title { font-size: 1.05rem; font-weight: 700; }
    .modal-close {
      background: var(--surface2); border: 1px solid var(--border);
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; font-size: 0.9rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--border); }
    .continent-block { margin-bottom: 0.9rem; }
    .continent-title {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.4rem;
    }
    .continent-countries { display: flex; flex-wrap: wrap; gap: 4px; }

    @media (max-width: 768px) {
      .main { flex-direction: column; }
      #map-wrap { min-height: 55vw; }
      .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 42vh; }
      .overland-toggle .toggle-label-text { display: none; }
    }
  </style>
</head>

      throw new Error("Leaflet non défini");

    // ── HELPERS DATES ──────────────────────────────────────────────────
    function parseDate(s) {
      if (!s) return new Date(0);
      const [d, m, y] = s.split('/');
      return new Date(`${y}-${m}-${d}`);
    }
    function formatDate(s) {
      if (!s) return '';
      const [d, m, y] = s.split('/');
      const mo = ['jan', 'fév', 'mar', 'avr', 'mai', 'jun', 'jul', 'aoû', 'sep', 'oct', 'nov', 'déc'];
      return `${parseInt(d)} ${mo[parseInt(m) - 1]} ${y}`;
    }

    // Accepte une date ISO ("2026-06-22T14:32:00") ou un format "lisible" générique.
    // Si le format n'est pas parsable, on retombe sur l'affichage brut.
    function formatRelativeUpdate(raw) {
      if (!raw) return { relative: 'Inconnue', exact: '' };
      const m = raw.match(/(\d{2})\/(\d{2})\/(\d{4}) à (\d{2}):(\d{2})/);
	const date = m ? new Date(`${m[3]}-${m[2]}-${m[1]}T${m[4]}:${m[5]}:00`) : new Date(raw);
      if (isNaN(date.getTime())) return { relative: raw, exact: '' };

      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.round(diffMs / 60000);
      const diffH = Math.round(diffMs / 3600000);
      const diffJ = Math.round(diffMs / 86400000);

      let relative;
      if (diffMin < 1) relative = "à l'instant";
      else if (diffMin < 60) relative = `il y a ${diffMin} min`;
      else if (diffH < 24) relative = `il y a ${diffH}h`;
      else if (diffJ === 1) relative = 'hier';
      else if (diffJ < 7) relative = `il y a ${diffJ} jours`;
      else relative = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });

      const exact = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })
        + ' à ' + date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

      return { relative, exact };
    }

    };

    function flag(country) {
      if (!country) return '🏳️';
      if (COUNTRY_DB[country]) return COUNTRY_DB[country][0];
      for (const [k, v] of Object.entries(COUNTRY_DB)) {
        if (country.includes(k) || k.includes(country)) return v[0];
      }
      return '🏳️';
    }

    function continentOf(country) {
      if (!country) return 'Autre';
      if (COUNTRY_DB[country]) return COUNTRY_DB[country][1];
      for (const [k, v] of Object.entries(COUNTRY_DB)) {
        if (country.includes(k) || k.includes(country)) return v[1];
      }
      return 'Autre';
    }

    // ── INITIALISATION DE LA CARTE LEAFLET ────────────────────────────
    const map = L.map('map', {
      center: [25, 10],
      zoom: 3,
      zoomControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    let currentMarker = null;
    let tripLayers = [];
    const routesLayerGroup = L.layerGroup().addTo(map);

    function isMobileLayout() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    // Sur mobile, la sidebar passe sous la carte (#map-wrap a une hauteur fixe en vh,
    // donc le conteneur Leaflet lui-même n'est PAS recouvert). On centre normalement,
    // mais on décale le point vers le HAUT du conteneur carte pour qu'il reste bien
    // visible et ne soit jamais collé au bord inférieur (qui touche la sidebar).
    function flyToCoords(lon, lat, zoom = 6) {
      if (isMobileLayout()) {
        const mapEl = document.getElementById('map');
        const h = mapEl.clientHeight || 300;
        // Décale le centre géographique vers le bas de ~12% de la hauteur de la carte,
        // ce qui fait apparaître le point réel plus haut dans la zone visible.
        const offsetPx = h * 0.12;
        const targetPoint = map.project([lat, lon], zoom).subtract([0, -offsetPx]);
        const targetLatLng = map.unproject(targetPoint, zoom);
        map.flyTo(targetLatLng, zoom, { animate: true, duration: 1.2 });
      } else {
        map.flyTo([lat, lon], zoom, { animate: true, duration: 1.2 });
      }
    }

    function tripPopupHTML(t) {
      return `
        <div class="trip-popup-card">
          <div class="tp-route">
            <span>${t.from}</span>
            <span class="tp-arrow">→</span>
            <span>${t.to}</span>
          </div>
          <div class="tp-meta">
            <span class="badge badge-date">📅 ${formatDate(t.date)}</span>
            <span class="badge badge-km">📏 ${t.km.toLocaleString('fr')} km</span>
            <span class="badge badge-tp">${t.emoji || '✈️'} ${t.label || 'Voyage'}</span>
            <span class="badge badge-co2">🌱 ${(t.co2Kg || 0).toLocaleString('fr', {maximumFractionDigits: 1})} kgCO2e</span>
          </div>
          <div class="tp-country">${flag(t.country)} ${t.country || 'Pays inconnu'}</div>
        </div>`;
    }

    function drawLeafletRoutes(trips) {
      trips.forEach((t, i) => {
        if (!(t.allCoords && t.allCoords.length >= 2)) return;

        const latLngs = t.allCoords.map(c => [c[1], c[0]]);
        const baseWeight = 3;

        const layer = L.polyline(latLngs, {
          color: t.color || '#4a90d9',
          weight: baseWeight,
          opacity: 0.85,
          lineCap: 'round',
          lineJoin: 'round'
        }).addTo(routesLayerGroup);

        const hitArea = L.polyline(latLngs, {
          color: '#000000',
          weight: 16,
          opacity: 0,
          lineCap: 'round',
          lineJoin: 'round'
        }).addTo(routesLayerGroup);

        hitArea.bindPopup(tripPopupHTML(t), { className: 'trip-popup', closeButton: true, autoPanPadding: [40, 40] });

        hitArea.on('mouseover', () => layer.setStyle({ weight: baseWeight + 3, opacity: 1 }));
        hitArea.on('mouseout',  () => { if (!layer._isActive) layer.setStyle({ weight: baseWeight, opacity: 0.85 }); });
        hitArea.on('click', () => highlightTrip(i));

        tripLayers.push({ layer, hitArea, trip: t, index: i });
      });
    }

    function highlightTrip(index) {
      tripLayers.forEach(({ layer }) => {
        layer._isActive = false;
        layer.setStyle({ weight: 3, opacity: 0.85 });
      });
      const found = tripLayers.find(tl => tl.index === index);
      if (!found) return;
      found.layer._isActive = true;
      found.layer.setStyle({ weight: 6, opacity: 1 });
      found.layer.bringToFront();

      document.querySelectorAll('.trip-item').forEach(el => el.classList.remove('is-active'));
      const sideEl = document.querySelector(`.trip-item[data-index="${index}"]`);
      if (sideEl) sideEl.classList.add('is-active');

      if (found.trip.destCoord) {
        const [lon, lat] = found.trip.destCoord;
        flyToCoords(lon, lat, 6);
      }
      found.hitArea.openPopup();
    }

    function setPulseMarker(lon, lat) {
      if (currentMarker) map.removeLayer(currentMarker);
      const pulseIcon = L.divIcon({ className: 'leaflet-pulse-icon', iconSize: [18, 18], iconAnchor: [6, 6] });
      currentMarker = L.marker([lat, lon], { icon: pulseIcon }).addTo(map);
    }

    function openCountriesModal(countries) {
      const byContinent = {};
      countries.forEach(c => {
        const cont = continentOf(c.name);
        if (!byContinent[cont]) byContinent[cont] = [];
        byContinent[cont].push(c);
      });
      const order = ['Europe', 'Asie', 'Afrique', 'Amériques', 'Océanie', 'Autre'];
      const continents = Object.keys(byContinent).sort((a, b) => order.indexOf(a) - order.indexOf(b));

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-card">
          <div class="modal-head">
            <div class="modal-title">🌍 Pays visités (${countries.length})</div>
            <button class="modal-close" aria-label="Fermer">✕</button>
          </div>
          ${continents.map(cont => `
            <div class="continent-block">
              <div class="continent-title">${cont}</div>
              <div class="continent-countries">
                ${byContinent[cont].map(c => `<div class="country-tag">${c.flag} ${c.name}</div>`).join('')}
              </div>
            </div>`).join('')}
        </div>`;

      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      overlay.querySelector('.modal-close').addEventListener('click', close);
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    }

    // ── FILTRAGE "DEPUIS LE DERNIER VOL" ──────────────────────────────
    // trips est trié du plus récent au plus ancien. On garde tout ce qui
    // est strictement plus récent que le dernier avion pris (le vol lui-même exclu).
    function computeOverlandTrips(trips) {
      const idx = trips.findIndex(t => t.type === 'avion');
      if (idx === -1) return trips.slice();
      return trips.slice(0, idx);
    }

    // ── RENDU PRINCIPAL (carte + sidebar) ─────────────────────────────
    let allTrips = [];
    let showOverlandOnly = true;

    function getCurrentTrips() {
      return showOverlandOnly ? computeOverlandTrips(allTrips) : allTrips;
    }

    function renderApp(trips) {
      // Reset carte
      routesLayerGroup.clearLayers();
      tripLayers = [];

      if (!trips.length) {
        sidebarContent.innerHTML = `<div class="no-data">✈️ Aucun trajet overland depuis le dernier vol pour l'instant.</div>`;
        return;
      }

      drawLeafletRoutes(trips);

      // Positionner le marqueur sur le dernier trajet de la vue courante
      const latest = trips[0];
      if (latest.destCoord) {
        const [lon, lat] = latest.destCoord;
        setPulseMarker(lon, lat);
        setTimeout(() => flyToCoords(lon, lat, 5), 500);
        document.getElementById('tip-city').textContent = `${latest.to} ${flag(latest.country)}`;
        document.getElementById('tip-date').textContent = `Dernière position · ${latest.country || ''} · ${formatDate(latest.date)}`;
      }

      // Stats recalculées sur la vue courante (overland ou complète)
      const totalKm = trips.reduce((s, t) => s + (t.km || 0), 0);
      const totalCo2 = trips.reduce((s, t) => s + (t.co2Kg || 0), 0);

      const year = new Date().getFullYear();
      const tripsThisYear = trips.filter(t => parseDate(t.date).getFullYear() === year);
      const yearKm = tripsThisYear.reduce((s, t) => s + (t.km || 0), 0);
      const yearCo2 = tripsThisYear.reduce((s, t) => s + (t.co2Kg || 0), 0);

      const updatedAt = formatRelativeUpdate(window.__updatedAtRaw);

      // Pays visités (sur la vue courante)
      const countriesMap = new Map();
      trips.forEach(t => {
        if (t.country && !countriesMap.has(t.country)) {
          countriesMap.set(t.country, { name: t.country, flag: flag(t.country) });
        }
      });
      const countries = [...countriesMap.values()];
      const COUNTRIES_PREVIEW_COUNT = 8;
      const countriesPreview = countries.slice(0, COUNTRIES_PREVIEW_COUNT);
      const countriesHidden = countries.length - countriesPreview.length;

      // Répartition par mode de transport (km + CO2e, sur la vue courante)
      const byType = {};
      trips.forEach(t => {
        const type = t.type || 'unknown';
        if (!byType[type]) byType[type] = { km: 0, co2: 0, label: t.label || 'Autre', emoji: t.emoji || '✈️', color: t.color || '#4a90d9' };
        byType[type].km += (t.km || 0);
        byType[type].co2 += (t.co2Kg || 0);
      });
      const maxKm = Math.max(...Object.values(byType).map(b => b.km), 1);
      const maxCo2 = Math.max(...Object.values(byType).map(b => b.co2), 1);

      sidebarContent.innerHTML = `
        <div class="sidebar-section">
          <div class="section-label">Dernière position</div>
          <div class="last-trip" id="last-trip-card">
            <div class="trip-route">
              <span class="trip-from">${latest.from}</span>
              <span class="trip-arrow">→</span>
              <span style="color:var(--pulse);font-weight:600">${latest.to}</span>
            </div>
            <div class="trip-meta">
              <span class="badge badge-date">📅 ${formatDate(latest.date)}</span>
              <span class="badge badge-km">📏 ${latest.km.toLocaleString('fr')} km</span>
              <span class="badge badge-tp">${latest.emoji || '✈️'} ${latest.label || 'Trajet'}</span>
              <span class="badge badge-co2">🌱 ${(t.co2Kg || 0).toLocaleString('fr', {maximumFractionDigits: 1})} kgCO2e</span>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Statistiques ${showOverlandOnly ? '(depuis le dernier vol)' : 'globales'}</div>
          <div class="stats-grid">
            <div class="stat-card" style="--stat-accent:#4a90d9">
              <div class="stat-icon">🌍</div>
              <div class="stat-value">${totalKm.toLocaleString('fr')}</div>
              <div class="stat-label">Total km</div>
            </div>
            <div class="stat-card" style="--stat-accent:#2e7d32">
              <div class="stat-icon">🌱</div>
              <div class="stat-value">${totalCo2.toLocaleString('fr', {maximumFractionDigits: 0})}</div>
              <div class="stat-label">Total kgCO2e</div>
            </div>
            <div class="stat-card" style="--stat-accent:#27ae60">
              <div class="stat-icon">📅</div>
              <div class="stat-value">${yearKm.toLocaleString('fr')}</div>
              <div class="stat-label">km cette année</div>
            </div>
            <div class="stat-card stat-card-update" style="--stat-accent:#e08e45" title="Mis à jour le ${updatedAt.exact}">
              <div class="stat-icon">🔄</div>
              <div class="stat-update-value">${updatedAt.relative}</div>
              <div class="stat-label">Mise à jour</div>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Pays visités (${countries.length})</div>
          <div class="countries-list">
            ${countriesPreview.map(c => `<div class="country-tag">${c.flag} ${c.name}</div>`).join('')}
            ${countriesHidden > 0 ? `<button class="country-tag-more" id="btn-more-countries">+${countriesHidden} de plus</button>` : ''}
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Modes de transport</div>
          <div class="transport-list">
            ${Object.values(byType).map(b => `
              <div class="transport-row">
                <div class="transport-icon" style="background:#eaf3fc">${b.emoji}</div>
                <div class="transport-label" style="color:${b.color}">${b.label}</div>
                <div class="transport-bars">
                  <div class="transport-bar-group">
                    <span class="transport-bar-tag">km</span>
                    <div class="transport-bar-wrap">
                      <div class="transport-bar" style="width:${(b.km / maxKm) * 100}%; background:${b.color}"></div>
                    </div>
                    <div class="transport-val">${b.km.toLocaleString('fr')} km</div>
                  </div>
                  <div class="transport-bar-group">
                    <span class="transport-bar-tag">CO2e</span>
                    <div class="transport-bar-wrap">
                      <div class="transport-bar" style="width:${(b.co2 / maxCo2) * 100}%; background:${b.color}; opacity:0.5"></div>
                    </div>
                    <div class="transport-val">${b.co2.toLocaleString('fr', {maximumFractionDigits: 0})} kgCO2e</div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Trajets récents</div>
          <div class="trips-list">
            ${trips.slice(0, 10).map((t, idx) => `
              <div class="trip-item" data-index="${idx}">
                <div class="trip-item-icon" style="background:#eafaf1">${t.emoji || '✈️'}</div>
                <div class="trip-item-route">
                  <div class="trip-item-from-to">${t.from} → ${t.to}</div>
                  <div class="trip-item-date">${formatDate(t.date)} · ${t.km} km ·  ${(t.co2Kg || 0).toLocaleString('fr', {maximumFractionDigits: 1})} kgCO2e</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      // Événements d'interaction
      document.getElementById('last-trip-card').addEventListener('click', () => highlightTrip(0));

      const btnMore = document.getElementById('btn-more-countries');
      if (btnMore) {
        btnMore.addEventListener('click', () => openCountriesModal(countries));
      }

      document.querySelectorAll('.trip-item').forEach(item => {
        item.addEventListener('click', () => {
          const idx = parseInt(item.getAttribute('data-index'));
          highlightTrip(idx);
        });
      });
    }

    // ── CHARGEMENT DYNAMIQUE DU JSON ET RENDU DE LA PAGE ──────────────────
    fetch('data.json')
      .then(response => {
        if (!response.ok) throw new Error("Erreur de chargement du JSON");
        return response.json();
      })
      .then(data => {
        if (!data.trips || !data.trips.length) {
          sidebarContent.innerHTML = `<div class="no-data">⚠️ Données manquantes</div>`;
          return;
        }

        allTrips = data.trips;
        window.__updatedAtRaw = data.updated_at;

        renderApp(getCurrentTrips());

        const overlandToggle = document.getElementById('overland-toggle');
        overlandToggle.addEventListener('change', () => {
          showOverlandOnly = overlandToggle.checked;
          renderApp(getCurrentTrips());
        });
      })
      .catch(err => {
        console.error(err);
        sidebarContent.innerHTML = `<div class="no-data">❌ Erreur de chargement des données.</div>`;
      });
  </script>
</body>
</html>
